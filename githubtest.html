<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Test</title>
    <style>
        body{
            background-color: black;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #container{
            background-color: white;
            margin-top: 400px;
        }

        #butt{
            height: 50px;
            width: 100px;
            background-color: aqua;
            
        }

        #butt:hover{
            background-color: blue;
            box-shadow: 4px 4px 10px blue;
            transition: 3s ease;
            cursor: pointer;
        }

        label{
            position: absolute;
            background-color: pink;
            opacity: 1;
            font-size: 14px;
            border-radius: 3px;
            transition: 1s ease;
            width: 100px;
            height: 50px;
            text-align: center;
            
        }

        label:hover{
            margin-top: 0px;
            margin-left: 0px;
            width: 57px;
            height: 15px;
            font-size: 14px;
            box-shadow: 2px 2px 5px palevioletred;
        }

    </style>
</head>
<body>

    <div id="container">
        <div id="napis">
            

            <label for="butt">Facebook</label>
            <input type="button" value="Button" id="butt">

        </div>
    </div>

</body>
</html>
